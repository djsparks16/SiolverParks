name: Build 5parks VST3

on:
push:
branches: [ main ]
pull_request:

jobs:
build:
runs-on: windows-latest

name: Checkout repository
uses: actions/checkout@v4

name: Setup MSVC
uses: ilammy/msvc-dev-cmd@v1

name: Configure CMake
run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

name: Build Plugin
run: cmake --build build --config Release --target FiveParksVST3_VST3

name: Upload VST3 Artifact
uses: actions/upload-artifact@v4
with:
name: 5parks-vst3
path: build/FiveParksVST3_artefacts/Release/VST3/*.vst3
